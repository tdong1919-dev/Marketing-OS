[build]
  command = "npm run build"

[build.environment]
  NODE_VERSION = "20"

[functions]
  included_files = [
    "node_modules/next/dist/**",
    "node_modules/next/package.json"
  ]

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
